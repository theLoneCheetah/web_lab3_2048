<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 играть онлайн</title>
    <!-- Стили отдельно в .css -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>2048</h1>
            <!-- Счёт -->
            <div class="score-container">
                Счёт: <span id="score">0</span>
            </div>
            <!-- Кнопки новой игры и отмены -->
            <div class="controls">
                <button id="new-game">Новая игра</button>
                <button id="undo">Отмена</button>
            </div>
        </div>

        <div class="game-board">
            <!-- Фоновая сетка из ячеек -->
            <div class="grid" id="grid"></div>
            <!-- Контейнер для плиток -->
            <div class="tiles-container" id="tiles-container"></div>
        </div>
        
        <!-- Блок окончания игры -->
        <div id="game-over-modal" class="modal hidden">
            <div class="modal-content">
                <!-- Модальное окно -->
                <p id="game-over-message">Игра окончена! Введите имя для сохранения рекорда:</p>
                <input type="text" id="player-name" placeholder="Ваше имя" maxlength="20">
                <!-- Кнопки сохранения результата и рестарта -->
                <div class="modal-buttons">
                    <button id="save-score-btn">Сохранить результат</button>
                    <button id="restart-from-modal">Начать заново</button>
                </div>
            </div>
        </div>

        <!-- Кнопка для открытия таблицы лидеров -->
        <div class="leaderboard-toggle">
            <button id="show-leaderboard">Рекорды</button>
        </div>

        <!-- Блок таблицы лидеров -->
        <div id="leaderboard-modal" class="modal hidden">
            <div class="modal-content">
                <!-- Модальное окно -->
                <h2>Таблица рекордов</h2>
                <table id="leaderboard-table">
                    <thead>
                        <tr><th>Имя</th><th>Очки</th><th>Дата</th></tr>
                    </thead>
                    <tbody id="leaderboard-body"></tbody>
                </table>
                <button id="close-leaderboard">Закрыть</button>
            </div>
        </div>
    </div>
    <!-- Подключение скрипта -->
    <script src="script.js"></script>
</body>
</html>
